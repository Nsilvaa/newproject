<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo VAR document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        input{
            padding: 10px;
            margin: 10px;
        }
        button{
            padding: 10px 20px;
            background-color: blueviolet;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 10px;
        }
        #resultado{
            margin-top: 20px;
            font-size: 18px;
            color: black;
        }
    </style>
</head>

<body>

    <h1>Exemplo VAR no document</h1>

    <label for="">Digite seu nome</label>
    <input type="text" nome="" id="nome">

    <button onclick="mostrarNome()">Mostrar</button>

    <p id="resultado"></p>

    <script>
        function mostrarNome() {
            var nome = document.getElementById("nome").value;

            document.getElementById("resultado").innerHTML = "Olá, " + nome;
            window.alert("Olá, " + nome);
            console.log("Olá, " + nome);
        }
    </script>
</body>

</html>
