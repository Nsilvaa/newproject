<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema almoxarifado</title>
</head>
<body>
    <center><h1>Sistema almoxarifado</h1>

    <label for="">Digite seu nome:</label>
    <input type="text" id="nome" placeholder="Digite aqui"><br>
    <label for="">Digite sua idade:</label>
    <input type="number" id="idade" placeholder="Digite aqui"><br>

    <button onclick="mostrar()">Entrar</button>

    <p id="resultado"></p>

    <script>
        function mostrar(){
        
            let nome = document.getElementById("nome").value;
            let idade = document.getElementById("idade").value;

            const sistema = " Sistema almoxarifado ";

            document.getElementById("resultado").innerHTML = "Bem-Vindo(a) ao " + sistema + nome + " você tem " + idade + " anos";
        }
    </script>
</body>
</html>
