<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golpe</title>
</head>

<body>
    <center>
        <h1>Golpe</h1>

        <label for="">Digite seu nome:</label>
        <input type="text" id="nome" placeholder="Digite aqui"><br>
        <label for="">Digite o primeiro número do seu cartão:</label>
        <input type="number" id="m1"><br>
        <label for="">Digite o segundo número do seu cartão:</label>
        <input type="number" id="m2"><br>
        <label for="">Digite o terceiro número do seu cartão:</label>
        <input type="number" id="m3">

        <center><button onclick="multiplicar()">Clonar</button></center>

        <p id="resultado"></p>

        <script>
            function multiplicar() {

                let nome = (document.getElementById("nome").value);
                let numero1 = Number(document.getElementById("m1").value);
                let numero2 = Number(document.getElementById("m2").value);
                let numero3 = Number(document.getElementById("m3").value);
                let resultado = numero1 * numero2 * numero3;

                document.getElementById("resultado").innerHTML = "Seu nome é " + nome + " o resultado da multiplicação é " + resultado;
            }
        </script>

</body>

</html>
